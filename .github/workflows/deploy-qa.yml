name: Build and Deploy to EC2

on:
  push:
    branches:
      - QA

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
    # Paso 1: Checkout code.
    - name: Checkout code
      uses: actions/checkout@v2

    # Paso 2: Configuration Docker
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # Paso 3: Login on Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Paso 4: Build and upload Docker images
    - name: Build and push Docker images
      run: |
        docker build -t alexmpz/update-client:qa ./update-client
        docker build -t alexmpz/get-client:qa ./get-client
        docker build -t alexmpz/delete-client:qa ./delete-client
        docker build -t alexmpz/create-client:qa ./create-client
        docker push alexmpz/update-client:qa
        docker push alexmpz/get-client:qa
        docker push alexmpz/delete-client:qa
        docker push alexmpz/create-client:qa

    # Paso 5: Connect to the EC2 instance using elastic IP and deploy the containers
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.8
      with:
        host: ${{ secrets.EC2_HOSTT }}  # iP EC2 elastic
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        port: 22
        script: |
          # Stop and delete old containers if they exist
          docker stop $(docker ps -aq)
          docker rm $(docker ps -aq)
          
          # Download images from Docker Hub
          docker pull alexmpz/update-client:qa
          docker pull alexmpz/get-client:qa
          docker pull alexmpz/delete-client:qa
          docker pull alexmpz/create-client:qa
          
          # Run containers on specific ports, passing environment variables
          
          docker run -d -p 3003:3003 \
            -e DB_HOST=${{ secrets.DB_HOST }} \
            -e DB_PORT=${{ secrets.DB_PORT }} \
            -e DB_USER=${{ secrets.DB_USER }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e DB_DATABASE=${{ secrets.DB_DATABASE }} \
            alexmpz/update-client:qa
          
          docker run -d -p 3002:3002 \
            -e DB_HOST=${{ secrets.DB_HOST }} \
            -e DB_PORT=${{ secrets.DB_PORT }} \
            -e DB_USER=${{ secrets.DB_USER }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e DB_DATABASE=${{ secrets.DB_DATABASE }} \
            alexmpz/get-client:qa
          
          docker run -d -p 3004:3004 \
            -e DB_HOST=${{ secrets.DB_HOST }} \
            -e DB_PORT=${{ secrets.DB_PORT }} \
            -e DB_USER=${{ secrets.DB_USER }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e DB_DATABASE=${{ secrets.DB_DATABASE }} \
            alexmpz/delete-client:qa
          
          docker run -d -p 3001:3001 \
            -e PG_HOST=${{ secrets.PG_HOST }} \
            -e PG_PORT=${{ secrets.PG_PORT }} \
            -e PG_USER=${{ secrets.PG_USER }} \
            -e PG_PASSWORD=${{ secrets.PG_PASSWORD }} \
            -e PG_DATABASE=${{ secrets.PG_DATABASE }} \
            alexmpz/create-client:qa
